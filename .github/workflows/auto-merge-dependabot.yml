name: Auto Merge Dependabot Updates

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-24.04
    steps:
      - name: Evaluate auto-merge scope
        id: evaluate
        shell: bash
        run: |
          set -euo pipefail
          pr="${{ github.event.workflow_run.pull_requests[0].number }}"
          labels="$(gh pr view "$pr" --json labels --jq '.labels[].name')"
          files="$(gh pr view "$pr" --json files --jq '.files[].path')"

          skip=false
          reasons=()
          if grep -qx 'semver-major' <<<"$labels"; then
            skip=true
            reasons+=("semver-major")
          fi
          if grep -Eq '(^|/)(Dockerfile|docker-compose\.ya?ml)$|^Deployment/|^\.github/workflows/' <<<"$files"; then
            skip=true
            reasons+=("deployment-or-workflow-surface")
          fi

          echo "skip=${skip}" >> "$GITHUB_OUTPUT"
          printf 'reasons=%s\n' "${reasons[*]:-none}" >> "$GITHUB_OUTPUT"
          {
            echo "Auto-merge skip: ${skip}"
            echo "Reasons: ${reasons[*]:-none}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Approve Pull Request
        if: steps.evaluate.outputs.skip != 'true'
        run: gh pr review "${{ github.event.workflow_run.pull_requests[0].number }}" --approve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Merge Pull Request
        if: steps.evaluate.outputs.skip != 'true'
        run: gh pr merge "${{ github.event.workflow_run.pull_requests[0].number }}" --merge --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
