name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deployment shell lint
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          {
            find Deployment/LocalCluster/Scripts Deployment/Common/Scripts -type f -name '*.sh' -print0
            find Deployment/Common/observability/scripts -type f -name '*.sh' -print0
          } | xargs -0 shellcheck --severity=warning

      - name: GitHub Actions workflow lint
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.12

      - name: Common release settings validation
        run: bash Deployment/Common/Scripts/validate-common-release.sh

      - name: Common observability validation
        run: bash Deployment/Common/observability/scripts/validate-observability.sh

      - name: Deployment audit
        run: bash Deployment/LocalCluster/Scripts/audit-deployment.sh

      - name: Deployment template render validation
        run: |
          python -m pip install jinja2
          bash Deployment/LocalCluster/Scripts/validate-rendered-templates.sh

      - name: Deployment YAML lint
        run: |
          python -m pip install --upgrade yamllint
          yamllint .github Deployment/LocalCluster Deployment/Common

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: BlazorAutoApp.Client/package-lock.json

      - name: Restore
        run: dotnet restore

      - name: Verify .NET formatting
        run: dotnet format --verify-no-changes --verbosity minimal --no-restore

      - name: Audit .NET packages for vulnerabilities
        run: dotnet list BlazorAutoApp.sln package --vulnerable --include-transitive

      - name: Audit .NET packages for deprecations
        run: dotnet list BlazorAutoApp.sln package --deprecated

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Docker preflight for integration tests
        run: |
          docker info
          docker pull postgres:18.4-alpine3.23
          docker pull redis:8.8.0-alpine3.23

      - name: Test
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: dotnet test --configuration Release --no-build

      - name: Install frontend dependencies
        working-directory: BlazorAutoApp.Client
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: BlazorAutoApp.Client
        run: npm audit

      - name: Build Tailwind CSS
        working-directory: BlazorAutoApp.Client
        run: npm run css:build

      - name: Verify generated CSS is current
        run: git diff --exit-code -- BlazorAutoApp/wwwroot/tailwind.css BlazorAutoApp.Client/package-lock.json

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Load release settings
        run: |
          {
            echo "APP_IMAGE=$(bash Deployment/Common/Scripts/read-release-setting.sh app_image)"
            echo "MIGRATION_BUNDLE_NAME=$(bash Deployment/Common/Scripts/read-release-setting.sh migration_bundle_name)"
            echo "MIGRATION_RUNTIME=$(bash Deployment/Common/Scripts/read-release-setting.sh migration_runtime)"
            echo "MIGRATION_ARTIFACT_NAME=$(bash Deployment/Common/Scripts/read-release-setting.sh migration_artifact_name)"
          } >> "$GITHUB_ENV"

      - name: Build EF migration bundle
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations bundle \
            --project BlazorAutoApp/BlazorAutoApp.csproj \
            --startup-project BlazorAutoApp/BlazorAutoApp.csproj \
            --configuration Release \
            --self-contained \
            --runtime "${MIGRATION_RUNTIME}" \
            --output "artifacts/migrations/${MIGRATION_BUNDLE_NAME}"

      - name: Upload migration bundle
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MIGRATION_ARTIFACT_NAME }}
          path: artifacts/migrations/${{ env.MIGRATION_BUNDLE_NAME }}

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            -f BlazorAutoApp/Dockerfile \
            -t "${APP_IMAGE}:${{ github.sha }}" \
            .

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          docker push "${APP_IMAGE}:${{ github.sha }}"
