name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-test-push:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, x64, "${{ vars.LOCALCLUSTER_RUNNER_LABEL || 'localcluster-books' }}"]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify node-main runner
        run: |
          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Host: $(hostname)"
          test "$(hostname)" = "node-main"

      - name: Ensure self-hosted runner prerequisites
        run: bash Deployment/LocalCluster/Scripts/ensure-actions-runner-prereqs.sh

      - name: Check self-hosted runner disk
        run: |
          df -h /
          free_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          if [ "$free_kb" -lt 10485760 ]; then
            echo "Less than 10 GB free on runner root filesystem; running Docker cleanup before failing." >&2
            bash Deployment/LocalCluster/Scripts/prune-docker-residue.sh \
              --force \
              --min-free-mb 10240 \
              --container-until 24h \
              --dangling-image-until 168h \
              --localcluster-image-until 168h \
              --builder-until 48h \
              --network-until 24h
            df -h /
            free_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
            if [ "$free_kb" -lt 10485760 ]; then
              echo "Less than 10 GB free on runner root filesystem after Docker cleanup." >&2
              exit 1
            fi
          fi

      - name: Configure self-hosted tool paths
        run: |
          echo "DOTNET_INSTALL_DIR=${RUNNER_TEMP}/dotnet" >> "$GITHUB_ENV"
          echo "DOTNET_ROOT=${RUNNER_TEMP}/dotnet" >> "$GITHUB_ENV"

      - name: Deployment shell lint
        run: |
          {
            find Deployment/LocalCluster/Scripts Deployment/Common/Scripts -type f -name '*.sh' -print0
            find Deployment/Cloud/Scripts -type f -name '*.sh' -print0
            find Deployment/Common/observability/scripts -type f -name '*.sh' -print0
          } | xargs -0 shellcheck --severity=warning

      - name: GitHub Actions workflow lint
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.12

      - name: Common release settings validation
        run: bash Deployment/Common/Scripts/validate-common-release.sh

      - name: Cloud deployment settings validation
        run: bash Deployment/Cloud/Scripts/validate-cloud-settings.sh

      - name: Common observability validation
        run: bash Deployment/Common/observability/scripts/validate-observability.sh

      - name: Deployment audit
        run: bash Deployment/LocalCluster/Scripts/audit-deployment.sh

      - name: Setup Python
        run: |
          python_venv="${RUNNER_TEMP}/ci-python"
          rm -rf "$python_venv"
          python3 -m venv "$python_venv"
          echo "${python_venv}/bin" >> "$GITHUB_PATH"
          "${python_venv}/bin/python" -m pip install --upgrade pip

      - name: Deployment template render validation
        run: |
          python -m pip install jinja2
          bash Deployment/LocalCluster/Scripts/validate-rendered-templates.sh

      - name: Deployment YAML lint
        run: |
          python -m pip install --upgrade yamllint
          yamllint .github Deployment docker-compose.yml .yamllint.yml

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Restore
        run: dotnet restore

      - name: Verify .NET formatting
        run: dotnet format --verify-no-changes --verbosity minimal --no-restore

      - name: Audit .NET packages for vulnerabilities
        run: dotnet list BlazorAutoApp.sln package --vulnerable --include-transitive

      - name: Audit .NET packages for deprecations
        run: dotnet list BlazorAutoApp.sln package --deprecated

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Traffic simulation wrapper help
        run: pwsh -File ./Scripts/RunSimulation.ps1 -Help

      - name: Docker preflight for integration tests
        run: |
          docker info
          docker pull postgres:18.4-alpine3.23
          docker pull redis:8.8.0-alpine3.23

      - name: Test
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: dotnet test --configuration Release --no-build

      - name: Install frontend dependencies
        working-directory: BlazorAutoApp.Client
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: BlazorAutoApp.Client
        run: npm audit

      - name: Build Tailwind CSS
        working-directory: BlazorAutoApp.Client
        run: npm run css:build

      - name: Verify generated CSS is current
        run: git diff --exit-code -- BlazorAutoApp/wwwroot/tailwind.css BlazorAutoApp.Client/package-lock.json

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Load release settings
        run: |
          {
            echo "APP_IMAGE=$(bash Deployment/Common/Scripts/read-release-setting.sh app_image)"
            echo "MIGRATION_BUNDLE_NAME=$(bash Deployment/Common/Scripts/read-release-setting.sh migration_bundle_name)"
            echo "MIGRATION_RUNTIME=$(bash Deployment/Common/Scripts/read-release-setting.sh migration_runtime)"
            echo "MIGRATION_ARTIFACT_NAME=$(bash Deployment/Common/Scripts/read-release-setting.sh migration_artifact_name)"
          } >> "$GITHUB_ENV"

      - name: Build EF migration bundle
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations bundle \
            --project BlazorAutoApp/BlazorAutoApp.csproj \
            --startup-project BlazorAutoApp/BlazorAutoApp.csproj \
            --configuration Release \
            --self-contained \
            --runtime "${MIGRATION_RUNTIME}" \
            --output "artifacts/migrations/${MIGRATION_BUNDLE_NAME}"

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            -f BlazorAutoApp/Dockerfile \
            -t "${APP_IMAGE}:${{ github.sha }}" \
            .

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          docker push "${APP_IMAGE}:${{ github.sha }}"

      - name: Upload migration bundle
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MIGRATION_ARTIFACT_NAME }}
          path: artifacts/migrations/${{ env.MIGRATION_BUNDLE_NAME }}
          retention-days: 7

      - name: Clean self-hosted Docker build residue
        if: always()
        run: |
          if ! bash Deployment/LocalCluster/Scripts/prune-docker-residue.sh \
            --force \
            --remove-image "${APP_IMAGE:-}:${{ github.sha }}" \
            --min-free-mb 20480 \
            --container-until 24h \
            --dangling-image-until 168h \
            --localcluster-image-until 168h \
            --builder-until 48h \
            --network-until 24h; then
            echo "::warning::Docker residue cleanup failed; inspect runner disk before the next deployment."
          fi

  prune-migration-artifacts:
    needs: build-test-push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, "${{ vars.LOCALCLUSTER_RUNNER_LABEL || 'localcluster-books' }}"]
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify node-main runner
        run: |
          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Host: $(hostname)"
          test "$(hostname)" = "node-main"

      - name: Load release settings
        run: |
          echo "MIGRATION_ARTIFACT_NAME=$(bash Deployment/Common/Scripts/read-release-setting.sh migration_artifact_name)" >> "$GITHUB_ENV"

      - name: Prune old migration bundle artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash Deployment/Common/Scripts/prune-actions-artifacts.sh \
            --artifact-name "${MIGRATION_ARTIFACT_NAME}" \
            --keep 5
