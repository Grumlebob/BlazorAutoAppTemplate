name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment audit
        run: bash Deployment/LocalCluster/Scripts/audit-deployment.sh

      - name: Deployment template render validation
        run: bash Deployment/LocalCluster/Scripts/validate-rendered-templates.sh

      - name: Deployment YAML lint
        run: |
          python -m pip install --upgrade yamllint
          yamllint .github Deployment/LocalCluster

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Load deployment settings
        run: |
          echo "APP_NAME=$(bash Deployment/LocalCluster/Scripts/read-deploy-setting.sh app_name)" >> "$GITHUB_ENV"
          echo "APP_IMAGE=$(bash Deployment/LocalCluster/Scripts/read-deploy-setting.sh app_image)" >> "$GITHUB_ENV"
          echo "MIGRATION_BUNDLE_NAME=$(bash Deployment/LocalCluster/Scripts/read-deploy-setting.sh migration_bundle_name)" >> "$GITHUB_ENV"

      - name: Build EF migration bundle
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations bundle \
            --project BlazorAutoApp/BlazorAutoApp.csproj \
            --startup-project BlazorAutoApp/BlazorAutoApp.csproj \
            --configuration Release \
            --self-contained \
            --runtime linux-x64 \
            --output "artifacts/migrations/${MIGRATION_BUNDLE_NAME}"

      - name: Upload migration bundle
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-migrate-linux-x64
          path: artifacts/migrations/${{ env.MIGRATION_BUNDLE_NAME }}

      - name: Build Docker image
        run: |
          docker build \
            -f BlazorAutoApp/Dockerfile \
            -t "${APP_IMAGE}:${{ github.sha }}" \
            .

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          docker push "${APP_IMAGE}:${{ github.sha }}"
