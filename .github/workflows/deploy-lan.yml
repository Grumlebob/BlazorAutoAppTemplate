name: Deploy App To LAN

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run the EF migration bundle before starting app servers
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-lan
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, homelab]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load deployment settings
        run: |
          echo "APP_NAME=$(python Deployment/LocalCluster/scripts/read-deploy-setting.py app_name)" >> "$GITHUB_ENV"
          echo "APP_IMAGE=$(python Deployment/LocalCluster/scripts/read-deploy-setting.py app_image)" >> "$GITHUB_ENV"
          echo "PUBLIC_HOSTNAME=$(python Deployment/LocalCluster/scripts/read-deploy-setting.py public_hostname)" >> "$GITHUB_ENV"
          echo "MIGRATION_BUNDLE_NAME=$(python Deployment/LocalCluster/scripts/read-deploy-setting.py migration_bundle_name)" >> "$GITHUB_ENV"
          echo "APP_VERSION=${GITHUB_SHA}" >> "$GITHUB_ENV"
          {
            echo "Deploying image:"
            echo "$(python Deployment/LocalCluster/scripts/read-deploy-setting.py app_image):${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists
        run: docker manifest inspect "${APP_IMAGE}:${APP_VERSION}" >/dev/null

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build migration bundle
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations bundle \
            --project BlazorAutoApp/BlazorAutoApp.csproj \
            --startup-project BlazorAutoApp/BlazorAutoApp.csproj \
            --configuration Release \
            --self-contained \
            --runtime linux-x64 \
            --output "artifacts/migrations/${MIGRATION_BUNDLE_NAME}"

      - name: Install Ansible
        run: bash Deployment/LocalCluster/scripts/install-ansible.sh

      - name: Write Ansible Vault password
        run: |
          umask 077
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > "/tmp/${APP_NAME}_ansible_vault_password"

      - name: Deployment preflight
        env:
          ANSIBLE_VAULT_PASSWORD_FILE: /tmp/${{ env.APP_NAME }}_ansible_vault_password
        run: bash Deployment/LocalCluster/scripts/preflight.sh deploy

      - name: Deploy with migrations
        if: inputs.run_migrations == 'true'
        working-directory: Deployment/LocalCluster/ansible
        run: |
          ansible-playbook -i ../inventory/prod/hosts.yml playbooks/site.yml \
            --vault-password-file /tmp/${APP_NAME}_ansible_vault_password \
            -e app_version=${APP_VERSION} \
            -e run_migrations=true \
            -e migration_bundle_local_path=${{ github.workspace }}/artifacts/migrations/${MIGRATION_BUNDLE_NAME}

      - name: Deploy without migrations
        if: inputs.run_migrations == 'false'
        working-directory: Deployment/LocalCluster/ansible
        run: |
          ansible-playbook -i ../inventory/prod/hosts.yml playbooks/site.yml \
            --vault-password-file /tmp/${APP_NAME}_ansible_vault_password \
            -e app_version=${APP_VERSION}

      - name: Verify public health
        run: curl -fsS "https://${PUBLIC_HOSTNAME}/health/ready"

      - name: Remove Ansible Vault password file
        if: always()
        run: rm -f "/tmp/${APP_NAME}_ansible_vault_password"
