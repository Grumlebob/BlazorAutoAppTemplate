name: CD - Deploy LocalCluster

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run the EF migration bundle before starting app servers
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: cd-localcluster
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, homelab]
    environment:
      name: localcluster

    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "LocalCluster CD must be dispatched from main, got ${GITHUB_REF}." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Load deployment settings
        run: |
          echo "APP_NAME=$(python Deployment/LocalCluster/scripts/lib/read-deploy-setting.py app_name)" >> "$GITHUB_ENV"
          echo "APP_IMAGE=$(python Deployment/LocalCluster/scripts/lib/read-deploy-setting.py app_image)" >> "$GITHUB_ENV"
          echo "PUBLIC_HOSTNAME=$(python Deployment/LocalCluster/scripts/lib/read-deploy-setting.py public_hostname)" >> "$GITHUB_ENV"
          echo "MIGRATION_BUNDLE_NAME=$(python Deployment/LocalCluster/scripts/lib/read-deploy-setting.py migration_bundle_name)" >> "$GITHUB_ENV"
          echo "APP_VERSION=${GITHUB_SHA}" >> "$GITHUB_ENV"
          {
            echo "Deploying image:"
            echo "$(python Deployment/LocalCluster/scripts/lib/read-deploy-setting.py app_image):${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Require successful CI for this commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_RUN_ID="$(python Deployment/LocalCluster/scripts/lib/find-successful-ci-run.py)"
          echo "CI_RUN_ID=${CI_RUN_ID}" >> "$GITHUB_ENV"
          echo "Using successful CI run: ${CI_RUN_ID}" >> "$GITHUB_STEP_SUMMARY"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists
        run: docker manifest inspect "${APP_IMAGE}:${APP_VERSION}" >/dev/null

      - name: Download migration bundle from CI
        if: inputs.run_migrations == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-migrate-linux-x64
          path: artifacts/migrations
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare migration bundle
        if: inputs.run_migrations == 'true'
        run: |
          test -f "artifacts/migrations/${MIGRATION_BUNDLE_NAME}"
          chmod 0750 "artifacts/migrations/${MIGRATION_BUNDLE_NAME}"

      - name: Install Ansible
        run: bash Deployment/LocalCluster/scripts/support/install-ansible.sh

      - name: Write Ansible Vault password
        run: |
          umask 077
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > "/tmp/${APP_NAME}_ansible_vault_password"

      - name: Deployment preflight
        env:
          ANSIBLE_VAULT_PASSWORD_FILE: /tmp/${{ env.APP_NAME }}_ansible_vault_password
        run: bash Deployment/LocalCluster/scripts/preflight.sh deploy

      - name: Deploy with migrations
        if: inputs.run_migrations == 'true'
        working-directory: Deployment/LocalCluster/ansible
        run: |
          ansible-playbook -i ../inventory/prod/hosts.yml playbooks/site.yml \
            --vault-password-file /tmp/${APP_NAME}_ansible_vault_password \
            -e app_version=${APP_VERSION} \
            -e run_migrations=true \
            -e migration_bundle_local_path=${{ github.workspace }}/artifacts/migrations/${MIGRATION_BUNDLE_NAME}

      - name: Deploy without migrations
        if: inputs.run_migrations == 'false'
        working-directory: Deployment/LocalCluster/ansible
        run: |
          ansible-playbook -i ../inventory/prod/hosts.yml playbooks/site.yml \
            --vault-password-file /tmp/${APP_NAME}_ansible_vault_password \
            -e app_version=${APP_VERSION}

      - name: Verify public health
        run: curl -fsS "https://${PUBLIC_HOSTNAME}/health/ready"

      - name: Remove Ansible Vault password file
        if: always()
        run: rm -f "/tmp/${APP_NAME}_ansible_vault_password"
