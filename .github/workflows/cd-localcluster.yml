name: CD - Deploy LocalCluster

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run the EF migration bundle before starting app servers
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: cd-localcluster
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, "${{ vars.LOCALCLUSTER_RUNNER_LABEL || 'localcluster' }}"]
    environment:
      name: ${{ vars.LOCALCLUSTER_ENVIRONMENT || 'localcluster' }}

    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "LocalCluster CD must be dispatched from main, got ${GITHUB_REF}." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Common release settings validation
        run: bash Deployment/Common/Scripts/validate-common-release.sh

      - name: Load deployment settings
        run: |
          APP_NAME="$(bash Deployment/LocalCluster/Scripts/read-deploy-setting.sh app_name)"
          APP_IMAGE="$(bash Deployment/Common/Scripts/read-release-setting.sh app_image)"
          PUBLIC_HOSTNAME="$(bash Deployment/LocalCluster/Scripts/read-deploy-setting.sh public_hostname)"
          MIGRATION_BUNDLE_NAME="$(bash Deployment/Common/Scripts/read-release-setting.sh migration_bundle_name)"
          MIGRATION_ARTIFACT_NAME="$(bash Deployment/Common/Scripts/read-release-setting.sh migration_artifact_name)"
          RUNNER_LABEL="$(bash Deployment/LocalCluster/Scripts/read-deploy-setting.sh runner_label)"
          {
            echo "APP_NAME=${APP_NAME}"
            echo "APP_IMAGE=${APP_IMAGE}"
            echo "PUBLIC_HOSTNAME=${PUBLIC_HOSTNAME}"
            echo "MIGRATION_BUNDLE_NAME=${MIGRATION_BUNDLE_NAME}"
            echo "MIGRATION_ARTIFACT_NAME=${MIGRATION_ARTIFACT_NAME}"
            echo "RUNNER_LABEL=${RUNNER_LABEL}"
            echo "SOURCE_REPO_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "APP_VERSION=${GITHUB_SHA}"
          } >> "$GITHUB_ENV"
          {
            echo "Deploying image:"
            printf '%s:%s\n' "${APP_IMAGE}" "${GITHUB_SHA}"
            echo
            echo "Public hostname:"
            printf '%s\n' "${PUBLIC_HOSTNAME}"
            echo
            echo "Expected app runner label:"
            printf '%s\n' "${RUNNER_LABEL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Require successful CI for this commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_RUN_ID="$(bash Deployment/LocalCluster/Scripts/find-successful-ci-run.sh)"
          echo "CI_RUN_ID=${CI_RUN_ID}" >> "$GITHUB_ENV"
          echo "Using successful CI run: ${CI_RUN_ID}" >> "$GITHUB_STEP_SUMMARY"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists
        run: docker manifest inspect "${APP_IMAGE}:${APP_VERSION}" >/dev/null

      - name: Download migration bundle from CI
        if: inputs.run_migrations == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.MIGRATION_ARTIFACT_NAME }}
          path: artifacts/migrations
          run-id: ${{ env.CI_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare migration bundle
        if: inputs.run_migrations == 'true'
        run: |
          test -f "artifacts/migrations/${MIGRATION_BUNDLE_NAME}"
          chmod 0750 "artifacts/migrations/${MIGRATION_BUNDLE_NAME}"

      - name: Install Ansible
        run: bash Deployment/LocalCluster/Scripts/install-ansible.sh

      - name: Write Ansible Vault password
        run: |
          umask 077
          VAULT_PASSWORD_FILE="$(mktemp "${RUNNER_TEMP:-/tmp}/${APP_NAME}_ansible_vault_password.XXXXXX")"
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > "${VAULT_PASSWORD_FILE}"
          echo "ANSIBLE_VAULT_PASSWORD_FILE=${VAULT_PASSWORD_FILE}" >> "$GITHUB_ENV"

      - name: Deployment preflight
        run: bash Deployment/LocalCluster/Scripts/preflight.sh deploy

      - name: Deploy with migrations
        if: inputs.run_migrations == 'true'
        working-directory: Deployment/LocalCluster/ansible
        run: |
          bash ../Scripts/with-deploy-lock.sh \
            ansible-playbook -i ../inventory/prod/hosts.yml playbooks/site.yml \
            --vault-password-file "${ANSIBLE_VAULT_PASSWORD_FILE}" \
            -e "app_version=${APP_VERSION}" \
            -e "app_image=${APP_IMAGE}" \
            -e "migration_bundle_name=${MIGRATION_BUNDLE_NAME}" \
            -e "source_repo_url=${SOURCE_REPO_URL}" \
            -e run_migrations=true \
            -e "migration_bundle_local_path=${{ github.workspace }}/artifacts/migrations/${MIGRATION_BUNDLE_NAME}"

      - name: Deploy without migrations
        if: inputs.run_migrations == 'false'
        working-directory: Deployment/LocalCluster/ansible
        run: |
          bash ../Scripts/with-deploy-lock.sh \
            ansible-playbook -i ../inventory/prod/hosts.yml playbooks/site.yml \
            --vault-password-file "${ANSIBLE_VAULT_PASSWORD_FILE}" \
            -e "app_version=${APP_VERSION}" \
            -e "app_image=${APP_IMAGE}" \
            -e "migration_bundle_name=${MIGRATION_BUNDLE_NAME}" \
            -e "source_repo_url=${SOURCE_REPO_URL}"

      - name: Run acceptance check
        run: bash Deployment/LocalCluster/Scripts/acceptance-check.sh

      - name: Remove Ansible Vault password file
        if: always()
        run: |
          if [ -n "${ANSIBLE_VAULT_PASSWORD_FILE:-}" ]; then
            rm -f "${ANSIBLE_VAULT_PASSWORD_FILE}"
          fi
