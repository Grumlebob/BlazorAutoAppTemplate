services:
  postgres:
    image: postgres:16.14-alpine3.23
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: BlazorAutoApp/Dockerfile
    env_file:
      - ./.env
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTPS_PORTS: "7186"
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: "localdevpassword"
      Database__RunMigrationsAtStartup: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    ports:
      - "127.0.0.1:${APP_HTTPS_HOST_PORT:-7186}:7186"
    volumes:
      - ./docker/https:/https:ro
      # Persist application storage such as DataProtection keys
      - ./data/storage:/app/Storage

  seq:
    image: datalust/seq:2025.2
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:${SEQ_UI_HOST_PORT:-8081}:80"          # UI
      - "127.0.0.1:${SEQ_INGESTION_HOST_PORT:-5341}:5341" # Ingestion
    volumes:
      - seqdata:/data

  redis:
    image: redis:7.4.9-alpine3.21
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  redisinsight:
    image: redis/redisinsight:2.70
    env_file:
      - ./.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${REDIS_INSIGHT_HOST_PORT:-5540}:5540" # Redis Insight UI
    volumes:
      - redisinsight:/data

volumes:
  pgdata:
  seqdata:
  redisinsight:
