---
- name: Run Ship database migration bundle
  hosts: node_db
  become: true
  vars_files:
    - ../../inventory/prod/vault.yml
  tasks:
    - name: Require local migration bundle
      ansible.builtin.assert:
        that:
          - migration_bundle_local_path is defined
          - migration_bundle_local_path | length > 0
        fail_msg: "Pass -e migration_bundle_local_path=<local path to ship-migrate>."

    - name: Ensure migration directory exists
      ansible.builtin.file:
        path: "{{ deploy_root }}/migrations"
        state: directory
        owner: deploy
        group: deploy
        mode: "0750"

    - name: Copy migration bundle
      ansible.builtin.copy:
        src: "{{ migration_bundle_local_path }}"
        dest: "{{ deploy_root }}/migrations/ship-migrate"
        owner: deploy
        group: deploy
        mode: "0750"

    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ deploy_root }}/backups"
        state: directory
        owner: deploy
        group: deploy
        mode: "0750"

    - name: Create pre-migration database backup
      ansible.builtin.shell: |
        set -eu
        cd {{ deploy_root }}
        set -a
        . ./.env
        set +a
        docker compose exec -T postgres pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB" | gzip > "backups/predeploy-$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
      args:
        executable: /bin/bash

    - name: Run migration bundle
      ansible.builtin.shell: |
        set -eu
        cd {{ deploy_root }}
        set -a
        . ./.env
        set +a
        chmod +x ./migrations/ship-migrate
        ./migrations/ship-migrate --connection "Host=localhost;Port=5432;Database=$POSTGRES_DB;Username=$POSTGRES_USER;Password=$POSTGRES_PASSWORD"
      args:
        executable: /bin/bash
