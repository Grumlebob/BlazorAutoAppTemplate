---
- name: Configure Cloud NAT gateway before private node package installs
  hosts: load_balancer
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - nat_gateway

- name: Configure private node egress route before package installs
  hosts:
    - app_servers
    - node_db
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - private_egress

- name: Provision common Cloud node baseline
  hosts: cloud
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - base
    - ssh_hardening

- name: Install Docker runtime on service nodes
  hosts:
    - load_balancer
    - app_servers
    - node_db
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - role: docker
      when: >-
        inventory_hostname not in (groups['load_balancer'] | default([]))
        or (observability_enabled | default(false) | bool)

- name: Apply Cloud host firewall rules on private service nodes
  hosts:
    - app_servers
    - node_db
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - firewall

- name: Apply Cloud host firewall rules on ingress node
  hosts: load_balancer
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - firewall
    - nat_gateway

- name: Deploy Cloud observability backend
  hosts: load_balancer
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - role: observability_backend
      when: observability_enabled | default(false) | bool

- name: Deploy Cloud observability agents
  hosts: cloud
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - role: observability_agent
      when: observability_enabled | default(false) | bool

- name: Install and configure Caddy on ingress node
  hosts: load_balancer
  become: true
  vars_files:
    - ../../../Common/release.yml
  roles:
    - caddy
