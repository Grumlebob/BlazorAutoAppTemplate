---
- name: Require NAT gateway runs on ingress node
  ansible.builtin.assert:
    that:
      - inventory_hostname in groups["load_balancer"]
    fail_msg: "nat_gateway role must run only on cloud-main."

- name: Enable IPv4 forwarding
  ansible.builtin.copy:
    dest: "/etc/sysctl.d/90-{{ app_name }}-nat-gateway.conf"
    content: "net.ipv4.ip_forward=1\n"
    owner: root
    group: root
    mode: "0644"
  register: cloud_nat_sysctl

- name: Apply IPv4 forwarding setting
  ansible.builtin.command: sysctl -p "/etc/sysctl.d/90-{{ app_name }}-nat-gateway.conf"
  changed_when: cloud_nat_sysctl.changed

- name: Install NAT gateway script
  ansible.builtin.template:
    src: nat-gateway.sh.j2
    dest: "/usr/local/sbin/{{ app_name }}-nat-gateway"
    owner: root
    group: root
    mode: "0755"

- name: Install NAT gateway service
  ansible.builtin.template:
    src: nat-gateway.service.j2
    dest: "/etc/systemd/system/{{ app_name }}-nat-gateway.service"
    owner: root
    group: root
    mode: "0644"

- name: Enable NAT gateway service
  ansible.builtin.systemd:
    name: "{{ app_name }}-nat-gateway"
    daemon_reload: true
    enabled: true
    state: started

- name: Apply NAT gateway rules
  ansible.builtin.command: "/usr/local/sbin/{{ app_name }}-nat-gateway"
  changed_when: false
