---
- name: Ensure deployment root exists
  ansible.builtin.file:
    path: "{{ deploy_root }}"
    state: directory
    owner: deploy
    group: deploy
    mode: "0750"

- name: Copy PostgreSQL and Redis compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../compose/node-db/docker-compose.yml"
    dest: "{{ deploy_root }}/docker-compose.yml"
    owner: deploy
    group: deploy
    mode: "0640"

- name: Render DB/Redis environment file
  ansible.builtin.template:
    src: node-db.env.j2
    dest: "{{ deploy_root }}/.env"
    owner: deploy
    group: deploy
    mode: "0640"

- name: Copy database maintenance scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../Scripts/Component/node-db/{{ item }}"
    dest: "{{ deploy_root }}/{{ item }}"
    owner: deploy
    group: deploy
    mode: "0750"
  loop:
    - backup-db.sh
    - reset-db.sh
    - restore-db.sh

- name: Require destructive node-db volume reset confirmation
  ansible.builtin.assert:
    that:
      - reset_node_db_volumes_confirmation is defined
      - reset_node_db_volumes_confirmation == app_name ~ '/postgres18-redis8-reset'
    fail_msg: "Pass -e reset_node_db_volumes=true -e reset_node_db_volumes_confirmation={{ app_name }}/postgres18-redis8-reset to discard PostgreSQL and Redis volumes."
  when: reset_node_db_volumes | default(false) | bool

- name: Reset PostgreSQL and Redis Docker volumes for approved major upgrade
  ansible.builtin.command: docker compose down -v
  args:
    chdir: "{{ deploy_root }}"
  become: true
  become_user: deploy
  register: postgres_node_db_volume_reset
  changed_when: >-
    postgres_node_db_volume_reset.rc == 0
    and ((postgres_node_db_volume_reset.stdout ~ postgres_node_db_volume_reset.stderr)
    is search("(?i)(removed|volume|container|network)"))
  when: reset_node_db_volumes | default(false) | bool

- name: Start PostgreSQL and Redis
  ansible.builtin.command: docker compose up -d --pull always
  args:
    chdir: "{{ deploy_root }}"
  become: true
  become_user: deploy
  register: postgres_compose_up
  changed_when: >-
    (postgres_compose_up.stdout ~ postgres_compose_up.stderr)
    is search("(?i)(created|started|recreated|pulled|downloaded|built|removed)")

- name: Wait for PostgreSQL to become ready
  ansible.builtin.command: docker compose exec -T postgres pg_isready -U {{ vault_postgres_user }} -d {{ vault_postgres_db }}
  args:
    chdir: "{{ deploy_root }}"
  become: true
  become_user: deploy
  register: postgres_ready
  retries: 20
  delay: 3
  until: postgres_ready.rc == 0
  changed_when: false

- name: Wait for Redis to become ready
  ansible.builtin.command: docker compose exec -T redis redis-cli -a {{ vault_redis_password }} ping
  args:
    chdir: "{{ deploy_root }}"
  become: true
  become_user: deploy
  register: postgres_redis_ready
  retries: 20
  delay: 3
  until: postgres_redis_ready.rc == 0
  changed_when: false
  no_log: true
