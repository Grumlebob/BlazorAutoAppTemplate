---
- name: Ensure deployment root exists
  ansible.builtin.file:
    path: "{{ deploy_root }}"
    state: directory
    owner: deploy
    group: deploy
    mode: "0750"

- name: Copy PostgreSQL and Redis compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../compose/node-db/docker-compose.yml"
    dest: "{{ deploy_root }}/docker-compose.yml"
    owner: deploy
    group: deploy
    mode: "0640"

- name: Render DB/Redis environment file
  ansible.builtin.template:
    src: node-db.env.j2
    dest: "{{ deploy_root }}/.env"
    owner: deploy
    group: deploy
    mode: "0640"

- name: Copy database maintenance scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../Scripts/Component/node-db/{{ item }}"
    dest: "{{ deploy_root }}/{{ item }}"
    owner: deploy
    group: deploy
    mode: "0750"
  loop:
    - backup-db.sh
    - restore-db.sh

- name: Start PostgreSQL and Redis
  ansible.builtin.command: docker compose up -d --pull always
  args:
    chdir: "{{ deploy_root }}"
  become: true
  become_user: deploy
  register: postgres_compose_up
  changed_when: >-
    (postgres_compose_up.stdout ~ postgres_compose_up.stderr)
    is search("(?i)(created|started|recreated|pulled|downloaded|built|removed)")

- name: Wait for PostgreSQL to become ready
  ansible.builtin.command: docker compose exec -T postgres pg_isready -U {{ vault_postgres_user }} -d {{ vault_postgres_db }}
  args:
    chdir: "{{ deploy_root }}"
  become: true
  become_user: deploy
  register: postgres_ready
  retries: 20
  delay: 3
  until: postgres_ready.rc == 0
  changed_when: false

- name: Wait for Redis to become ready
  ansible.builtin.command: docker compose exec -T -e REDISCLI_AUTH redis redis-cli ping
  args:
    chdir: "{{ deploy_root }}"
  become: true
  become_user: deploy
  environment:
    REDISCLI_AUTH: "{{ vault_redis_password }}"
  register: postgres_redis_ready
  retries: 20
  delay: 3
  until: postgres_redis_ready.rc == 0
  changed_when: false
  no_log: true
