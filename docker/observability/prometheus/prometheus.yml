global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          deployment_target: local

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345
        labels:
          deployment_target: local

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          deployment_target: local
          node: local-data

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          deployment_target: local
          node: local-data
